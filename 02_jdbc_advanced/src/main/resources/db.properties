# Externalised DB credentials. Loaded from the classpath via:
#     ClassLoader.getSystemResourceAsStream("db.properties")
#
# Why externalise? Three reasons:
#   1. You can swap dev / staging / prod without recompiling.
#   2. Credentials never end up in version control (add to .gitignore in real projects).
#   3. Spring's @PropertySource and Spring Boot's application.properties
#      are this same idea, more polished.

db.url=jdbc:mysql://localhost:3306/learning_db
db.user=learner
db.password=learner_pw
