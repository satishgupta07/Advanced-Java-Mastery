# =============================================================================
# Spring Boot configuration.
#
# Compare this 10-line file to Phase 9's AppConfig.java + hibernate
# Properties block. Same effect — Spring Boot reads these keys and
# auto-configures the matching beans.
# =============================================================================

# ---- DataSource (auto-configured because mysql-connector-j is on the classpath) ----
spring.datasource.url=jdbc:mysql://localhost:3306/learning_db
spring.datasource.username=learner
spring.datasource.password=learner_pw

# ---- JPA / Hibernate (auto-configured because spring-boot-starter-data-jpa is on the classpath) ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- Web (embedded Tomcat) ----
server.port=8080

# Quieter startup banner; flip if you want the ASCII art back
spring.main.banner-mode=off
